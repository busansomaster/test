<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSANSO NATION</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#111;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff0000;
}

.auth-buttons{
    display:flex;
    gap:10px;
}

.auth-buttons button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.login-btn{
    background:#222;
    color:white;
}

.signup-btn{
    background:#ff0000;
    color:white;
}

.auth-buttons button:hover{
    opacity:0.9;
    transform:scale(1.05);
}

/* HERO */
.hero{
    height:70vh;
    background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600&auto=format&fit=crop') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:700px;
}

.hero h1{
    font-size:52px;
    margin-bottom:15px;
}

.hero p{
    color:#ddd;
    margin-bottom:25px;
    line-height:1.6;
}

.watch-btn{
    background:#ff0000;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* SECTIONS */
.section{
    padding:30px 20px;
}

.section-title{
    font-size:26px;
    margin-bottom:20px;
}

/* MOVIE ROW */
.movie-row{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-bottom:10px;
}

.movie-card{
    min-width:180px;
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.movie-card:hover{
    transform:scale(1.05);
}

.movie-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.movie-info{
    padding:12px;
}

.movie-info h3{
    margin-bottom:8px;
    font-size:18px;
}

.movie-info button{
    width:100%;
    padding:10px;
    border:none;
    background:#ff0000;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* FOOTER */
footer{
    text-align:center;
    padding:25px;
    color:#aaa;
    background:#111;
    margin-top:30px;
}
</style>
</head>
<body>

<header>
    <div class="logo">BUSANSO NATION</div>

    <div class="auth-buttons">
        <button class="login-btn">LOGIN</button>
        <button class="signup-btn">SIGN UP</button>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Unlimited Movies & Series</h1>
        <p>
            Watch trending movies, TV series, live streams and exclusive content
            anytime on your phone, tablet or Smart TV.
        </p>

        <button class="watch-btn">
            START WATCHING
        </button>
    </div>
</section>

<section class="section">
    <h2 class="section-title">Trending Now</h2>

    <div class="movie-row">

        <div class="movie-card">
            <img src="https://picsum.photos/300/400?1">
            <div class="movie-info">
                <h3>Shadow City</h3>
                <button>WATCH NOW</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/400?2">
            <div class="movie-info">
                <h3>Night Hunter</h3>
                <button>WATCH NOW</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/400?3">
            <div class="movie-info">
                <h3>Moon Light</h3>
                <button>WATCH NOW</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/400?4">
            <div class="movie-info">
                <h3>Avaanch</h3>
                <button>WATCH NOW</button>
            </div>
        </div>

    </div>
</section>

<section class="section">
    <h2 class="section-title">Quick Access</h2>

    <div style="display:flex; gap:15px; flex-wrap:wrap;">

        <button class="watch-btn">LIVE TV</button>
        <button class="watch-btn">MOVIES</button>
        <button class="watch-btn">SERIES</button>
        <button class="watch-btn">ANIME</button>
        <button class="watch-btn">DOWNLOADS</button>

    </div>
</section>

<footer>
    © 2026 BUSANSO NATION • All Rights Reserved
</footer>

</body>
</html>
