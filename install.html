<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Install BUSANSO NATION</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:#181818;
    border-radius:24px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.logo{
    width:120px;
    height:120px;
    border-radius:30px;
    object-fit:cover;
    margin-bottom:20px;
}

h1{
    font-size:34px;
    margin-bottom:15px;
}

p{
    color:#cfcfcf;
    line-height:1.7;
    margin-bottom:25px;
}

.install-btn{
    width:100%;
    border:none;
    background:#ff0000;
    color:white;
    padding:18px;
    border-radius:14px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.install-btn:hover{
    transform:scale(1.02);
}

.message-box{
    margin-top:20px;
    background:#111;
    border-radius:14px;
    padding:18px;
    display:none;
    animation:fadeIn 0.4s ease;
}

.message-box h3{
    margin-bottom:10px;
    color:#ff4444;
}

.message-box p{
    margin:0;
    color:#ddd;
    font-size:15px;
}

.message-box ol{
    margin-top:12px;
    padding-left:20px;
    text-align:left;
}

.message-box li{
    margin-bottom:10px;
    color:#ddd;
}

.success{
    background:#0f2b16;
}

.success h3{
    color:#4dff88;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <img src="./icon-512.png" class="logo">

    <h1>BUSANSO NATION</h1>

    <p>
        Install the app for faster streaming,
        fullscreen viewing and Smart TV support.
    </p>

    <button id="installBtn" class="install-btn">
        CHECKING...
    </button>

    <div id="messageBox" class="message-box"></div>

</div>

<script>
let deferredPrompt = null;

const installBtn = document.getElementById('installBtn');
const messageBox = document.getElementById('messageBox');

// CHECK IF APP ALREADY INSTALLED
const isStandalone =
window.matchMedia('(display-mode: standalone)').matches ||
window.navigator.standalone === true;

// REGISTER SERVICE WORKER
async function registerSW(){

    if('serviceWorker' in navigator){

        try{

            await navigator.serviceWorker.register(
                './service-worker.js'
            );

            await navigator.serviceWorker.ready;

            console.log('SW READY');

        } catch(err){

            console.log(err);

        }

    }

}

registerSW();

// ALREADY INSTALLED
if(isStandalone){

    installBtn.innerText = 'OPEN APP';

    installBtn.onclick = () => {

        window.location.href =
        './home.html';

    };

} else {

    installBtn.innerText =
    'INSTALL APP';

}

// SAVE INSTALL PROMPT
window.addEventListener(
'beforeinstallprompt',

(e)=>{

    console.log(
    'INSTALL AVAILABLE'
    );

    e.preventDefault();

    deferredPrompt = e;

});

// INSTALL BUTTON
installBtn.onclick = async ()=>{

    // OPEN APP
    if(isStandalone){

        window.location.href =
        './home.html';

        return;

    }

    // REAL INSTALL
    if(deferredPrompt){

        deferredPrompt.prompt();

        const choice =
        await deferredPrompt.userChoice;

        console.log(choice.outcome);

        if(choice.outcome === 'accepted'){

            installBtn.innerText =
            'INSTALLING...';

        }

    } else {

        // NICE MESSAGE
        messageBox.style.display =
        'block';

        messageBox.innerHTML = `

        <h3>
        Preparing Installation...
        </h3>

        <p style="
        margin-top:10px;
        line-height:1.7;
        color:#ccc;
        ">

        Please wait a few seconds
        and tap INSTALL APP again.

        <br><br>

        Chrome is still preparing
        the installation process.

        </p>
        `;

    }

};

// INSTALLED EVENT
window.addEventListener(
'appinstalled',

()=>{

    installBtn.innerText =
    'OPEN APP';

    messageBox.style.display =
    'block';

    messageBox.classList.add(
    'success'
    );

    messageBox.innerHTML = `

    <h3>
    Installation Complete
    </h3>

    <p style="
    margin-top:10px;
    color:#ccc;
    ">

    BUSANSO NATION installed
    successfully.

    </p>
    `;

    installBtn.onclick = ()=>{

        window.location.href =
        './home.html';

    };

    // AUTO OPEN APP
    setTimeout(()=>{

        window.location.href =
        './home.html';

    },1500);

});
</script>
</body>
</html>
