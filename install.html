<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Install BUSANSO NATION</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:#181818;
    border-radius:24px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.logo{
    width:120px;
    height:120px;
    border-radius:30px;
    object-fit:cover;
    margin-bottom:20px;
}

h1{
    font-size:34px;
    margin-bottom:15px;
}

p{
    color:#cfcfcf;
    line-height:1.7;
    margin-bottom:25px;
}

.install-btn{
    width:100%;
    border:none;
    background:#ff0000;
    color:white;
    padding:18px;
    border-radius:14px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.install-btn:hover{
    transform:scale(1.02);
}

.message-box{
    margin-top:20px;
    background:#111;
    border-radius:14px;
    padding:18px;
    display:none;
    animation:fadeIn 0.4s ease;
}

.message-box h3{
    margin-bottom:10px;
    color:#ff4444;
}

.message-box p{
    margin:0;
    color:#ddd;
    font-size:15px;
}

.message-box ol{
    margin-top:12px;
    padding-left:20px;
    text-align:left;
}

.message-box li{
    margin-bottom:10px;
    color:#ddd;
}

.success{
    background:#0f2b16;
}

.success h3{
    color:#4dff88;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <img src="./icon-512.png" class="logo">

    <h1>BUSANSO NATION</h1>

    <p>
        Install the app for faster streaming,
        fullscreen viewing and Smart TV support.
    </p>

    <button id="installBtn" class="install-btn">
        CHECKING...
    </button>

    <div id="messageBox" class="message-box"></div>

</div>

<script>
let deferredPrompt;

const installBtn = document.getElementById('installBtn');
const messageBox = document.getElementById('messageBox');

const isStandalone =
window.matchMedia('(display-mode: standalone)').matches ||
window.navigator.standalone === true;

// SHOW CUSTOM MESSAGE
function showMessage(title, text, success=false){

    messageBox.style.display = 'block';

    if(success){
        messageBox.classList.add('success');
    } else {
        messageBox.classList.remove('success');
    }

    messageBox.innerHTML = `
        <h3>${title}</h3>
        ${text}
    `;
}

// ALREADY INSTALLED
if(isStandalone){

    installBtn.innerText = 'OPEN APP';

    showMessage(
        'App Installed',
        '<p>BUSANSO NATION is already installed on this device.</p>',
        true
    );

    installBtn.onclick = () => {

        window.location.href = './home.html';

    };

} else {

    installBtn.innerText = 'INSTALL APP';

    // SAVE INSTALL PROMPT
    window.addEventListener('beforeinstallprompt', (e) => {

        e.preventDefault();

        deferredPrompt = e;

        console.log('Install prompt ready');

    });

    // INSTALL BUTTON CLICK
    installBtn.onclick = async () => {

        // REAL INSTALL POPUP
        if(deferredPrompt){

            deferredPrompt.prompt();

            const { outcome } =
            await deferredPrompt.userChoice;

            if(outcome === 'accepted'){

                showMessage(
                    'Installing...',
                    '<p>BUSANSO NATION is being installed.</p>',
                    true
                );

            }

            deferredPrompt = null;

        } else {

            // CUSTOM BEAUTIFUL FALLBACK
            showMessage(
                'Install Manually',
                `
                <p>
                Your browser has not enabled automatic installation yet.
                </p>

                <ol>
                    <li>Open this website in <b>Google Chrome</b></li>
                    <li>Tap the <b>3 dots menu</b> at top right</li>
                    <li>Tap <b>Install App</b></li>
                    <li>Tap <b>Install</b></li>
                </ol>
                `
            );

        }

    };

}

// INSTALLED EVENT
window.addEventListener('appinstalled', () => {

    installBtn.innerText = 'OPEN APP';

    showMessage(
        'Installation Complete',
        '<p>BUSANSO NATION installed successfully.</p>',
        true
    );

    installBtn.onclick = () => {

        window.location.href = './home.html';

    };

});

// REGISTER SERVICE WORKER
if('serviceWorker' in navigator){

    window.addEventListener('load', () => {

        navigator.serviceWorker
        .register('./service-worker.js')
        .then(() => {

            console.log('Service Worker Registered');

        });

    });

}
</script>

</body>
</html>
