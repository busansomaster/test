<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSANSO NATION</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    text-align:center;
    animation:fadeIn 2s ease;
}

.logo{
    font-size:58px;
    font-weight:bold;
    color:#ff0000;
    letter-spacing:2px;
    animation:zoom 2s ease;
}

.sub{
    margin-top:15px;
    color:#ccc;
    font-size:18px;
    animation:fadeIn 3s ease;
}

.loader{
    width:70px;
    height:70px;
    border:5px solid #222;
    border-top:5px solid #ff0000;
    border-radius:50%;
    margin:35px auto 0;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

@keyframes zoom{
    0%{
        transform:scale(0.5);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        BUSANSO NATION
    </div>

    <div class="sub">
        Unlimited Entertainment
    </div>

    <div class="loader"></div>

</div>

<script>

// CHECK IF INSTALLED
const isStandalone =
window.matchMedia('(display-mode: standalone)').matches ||
window.navigator.standalone === true;

// IF APP INSTALLED → OPEN HOME
if (isStandalone) {

    setTimeout(() => {

        window.location.href = './home.html';

    }, 2000);

} else {

    // NORMAL WEBSITE VISITORS → INSTALL PAGE
    setTimeout(() => {

        window.location.href = './install.html';

    }, 3000);

}

</script>

</body>
</html>
